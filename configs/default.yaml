# Example configuration for first-stage public release.

paths:
  device_list_csv: data/device_list.csv
  device_type_csv: data/device_type.csv
  manual_ip_csv: null  # optional local CSV; do not commit local paths
  outputs_dir: outputs

flow_preprocessing:
  flow_timeout: 120
  min_packet_count: 5
  standardized_protocol_ports: [37, 53, 123]
  workers: 16

ps_dtw:
  sigma: 35.0
  similarity_threshold: 0.90
  max_seq_len: 100
  small_thresh: 100.0
  small_weight: 10.0
  mtu_thresh: 1400.0
  mtu_weight: 1.0
  big_thresh: 350.0
  big_weight: 8.0
  cross_weight: 3.0

corroboration:
  anchor_threshold: 0.5
