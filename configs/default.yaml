# Example configuration for first-stage public release.

paths:
  device_list_csv: data/device_list.csv
  device_type_csv: data/device_type.csv
  domain_annotation_csv: data/domain_level_annotation.csv
  manual_ip_csv: null  # optional local CSV; do not commit local paths
  outputs_dir: outputs
  dataset_roots: []  # local raw dataset directories
  cleaned_flow_pickle: outputs/Traffic_Cleaned_v3_Final.pkl
  endpoint_pair_input_csv: null  # optional existing pair-level result
  global_component_input_csv: null  # optional existing global component result

dimension1:
  mode: reuse  # run | reuse | skip
  groups_csv: outputs/documentary_groups.csv
  model: gemini-3.1-pro-preview
  api_key_env: GEMINI_API_KEY
  use_grounding: true
  max_retries: 3
  cache_dir: outputs/dim1_cache
  assessment_output_dir: outputs/dim1_assessment

flow_preprocessing:
  flow_timeout: 120
  save_interval: 200
  min_packet_count: 5
  standardized_protocol_ports: [37, 53, 123]
  workers: 16

ps_dtw:
  sigma: 35.0
  similarity_threshold: 0.90
  max_seq_len: 100
  small_thresh: 100.0
  small_weight: 10.0
  mtu_thresh: 1400.0
  mtu_weight: 1.0
  big_thresh: 350.0
  big_weight: 8.0
  cross_weight: 3.0
